app:
  name: eCloudControl.com
  code: ECSWEB
  notify: appzdev@cloudbourne.co

build:
  version: 3.0
  env: DEV
  build_file: none
  output_files: output/*.zip
  image_template: wordpress-6.2
  image_name: myco/website

deploy:
  context: arjun-cc/DEV
  type: statefulset
  replicas: 1
  resources: xx-large
  port:
  - 443

volumes:
  - claim: wp-uploads
    mount: /var/www/html/wp-content/uploads
    name: uploads
    size: 250Gi
    mode: ReadWriteOnce
    class: microk8s-hostpath
    matchLabels: false
  - claim: wp-backup
    mount: /appz/backup
    name: backup
    size: 250Gi
    mode: ReadWriteOnce
    class: microk8s-hostpath
    matchLabels: false

monitor:
  notify: appzops@cloudbourne.co      

properties:
  ENABLE_HA: "no"

  MYSQL_HOST: "mysql-5-7:3306"
  MYSQL_DATABASE: "wordpress"
  MYSQL_USER: "wordpress"

  MYSQL_PASSWORD:
    vault: MYSQL_WORDPRESS_PASSWORD

  MYSQL_ROOT_PASSWORD:
    vault: MYSQL_ROOT_PASSWORD_KEY

  MYSQL_WORDPRESS_PASSWORD:
    vault: MYSQL_WORDPRESS_PASSWORD

  SITE_TITLE: "Wordpress AppZ Workshop Demo"
  revision : 41
       
